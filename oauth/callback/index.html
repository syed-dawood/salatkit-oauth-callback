<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SalatKit OAuth Callback</title>
  <style>
    :root { color-scheme: light dark; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0f172a; color: #e2e8f0; }
    main { max-width: 28rem; padding: 2rem; text-align: center; }
    h1 { font-size: 1.25rem; margin-bottom: 0.5rem; }
    p { color: #94a3b8; line-height: 1.5; }
    code { background: #1e293b; padding: 0.15rem 0.4rem; border-radius: 0.25rem; font-size: 0.85rem; }
    .box { margin-top: 1.25rem; padding: 1rem; border-radius: 0.75rem; background: #1e293b; text-align: left; word-break: break-all; font-size: 0.85rem; white-space: pre-wrap; }
    a.button { display: inline-block; margin-top: 1rem; padding: 0.75rem 1rem; border-radius: 0.5rem; background: #22c55e; color: #052e16; text-decoration: none; font-weight: 600; }
    .muted { font-size: 0.8rem; margin-top: 1rem; }
  </style>
</head>
<body>
  <main>
    <h1 id="title">Returning to SalatKit…</h1>
    <p id="subtitle">Completing Quran Foundation sign-in.</p>
    <div class="box" id="details" hidden></div>
    <a class="button" id="openApp" href="#" hidden>Open SalatKit</a>
    <p class="muted">Callback: <code id="callbackUrl"></code></p>
  </main>
  <script>
    (function () {
      var callback = "https://syed-dawood.github.io/salatkit-oauth-callback/oauth/callback";
      document.getElementById("callbackUrl").textContent = callback;
      var params = new URLSearchParams(window.location.search);
      var debug = params.get("debug") === "1";
      var query = window.location.search || "";
      var appURL = "salatkit://oauth/callback" + query;
      if (params.get("error")) {
        document.getElementById("title").textContent = "Sign-in issue";
        document.getElementById("subtitle").textContent = params.get("error_description") || params.get("error");
      }
      var details = document.getElementById("details");
      var lines = ["Received at: " + new Date().toISOString(), "Full URL: " + window.location.href];
      params.forEach(function (value, key) { lines.push(key + ": " + value); });
      details.hidden = false;
      details.textContent = lines.join("\n");
      var openApp = document.getElementById("openApp");
      openApp.href = appURL;
      openApp.hidden = false;
      if (debug) {
        document.getElementById("title").textContent = "OAuth callback received";
        document.getElementById("subtitle").textContent = "Debug mode — params shown below.";
        return;
      }
      window.setTimeout(function () { window.location.replace(appURL); }, 300);
    })();
  </script>
</body>
</html>
